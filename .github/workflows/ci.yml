name: NetGuard IDS — CI

on:
  push:
    branches: ["main", "develop", "feature/**", "fix/**"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

# Cancel in-progress runs when a new commit arrives on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.11"
  NETGUARD_API_KEY: "ci-test-key"

jobs:
  # ─────────────────────────────────────────────────────────────
  #  1. Lint & type check (fast — runs on every push/PR)
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_DEFAULT }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: ruff — check (lint)
        run: ruff check . --output-format=github

      - name: ruff — format check
        run: ruff format --check .

      - name: mypy — type check
        run: mypy core/ api/ cli/ utils/ --ignore-missing-imports --no-error-summary
        continue-on-error: true   # warn, don't block merge while types are being added

  # ─────────────────────────────────────────────────────────────
  #  2. Test matrix (Python 3.10, 3.11, 3.12 × Ubuntu + Windows)
  # ─────────────────────────────────────────────────────────────
  test:
    name: Tests — Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:     [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install core + api + cli + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[api,cli,dev]" || pip install \
            fastapi "uvicorn[standard]" pydantic websockets \
            psutil pyyaml python-dotenv requests schedule \
            scikit-learn joblib numpy rich typer \
            pytest pytest-asyncio pytest-cov pytest-mock httpx

      - name: Run test suite with coverage
        env:
          NETGUARD_API_KEY: ${{ env.NETGUARD_API_KEY }}
        run: |
          pytest tests/ \
            --cov=api --cov=cli --cov=core --cov=utils \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          name: netguard-${{ matrix.python }}
        continue-on-error: true   # don't fail if Codecov is unreachable

  # ─────────────────────────────────────────────────────────────
  #  3. Docker build (verify image can be built)
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: netguard-ids:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  #  4. MkDocs — verify docs site builds
  # ─────────────────────────────────────────────────────────────
  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_DEFAULT }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install MkDocs
        run: pip install mkdocs-material mkdocstrings[python]

      - name: Build docs
        run: mkdocs build --strict
        continue-on-error: true   # warn until docs are complete

  # ─────────────────────────────────────────────────────────────
  #  5. Publish to PyPI on tags (vX.Y.Z)
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_DEFAULT }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI (trusted publish)
        uses: pypa/gh-action-pypi-publish@release/v1
