site_name: NetGuard IDS
site_description: Advanced Firewall & Intrusion Detection System with ML anomaly detection
site_url: https://armanrbu.github.io/Firewall-Configuration-and-Basic-Intrusion-Detection-System/
repo_url: https://github.com/Armanrbu/Firewall-Configuration-and-Basic-Intrusion-Detection-System
repo_name: Armanrbu/netguard-ids
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 Arman

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
    - content.code.annotate
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    logo: material/shield-lock

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - GUI Interface: user-guide/gui.md
    - CLI Reference: user-guide/cli.md
    - REST API: user-guide/api.md
    - Writing Rules: user-guide/rules.md
  - Architecture:
    - Overview: architecture/overview.md
    - Detection Engine: architecture/detection-engine.md
    - EventBus: architecture/eventbus.md
    - Plugin System: architecture/plugins.md
  - API Reference:
    - core.engine: api-reference/core.engine.md
    - core.event_bus: api-reference/core.event_bus.md
    - core.detector_abc: api-reference/core.detector_abc.md
    - core.rule_engine: api-reference/core.rule_engine.md
    - core.app_runner: api-reference/core.app_runner.md
    - api.server: api-reference/api.server.md
    - api.schemas: api-reference/api.schemas.md
  - Deployment:
    - Docker: deployment/docker.md
    - Systemd: deployment/systemd.md
  - Contributing: contributing.md
  - Security: SECURITY.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
